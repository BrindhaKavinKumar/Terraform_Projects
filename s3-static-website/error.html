<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — RIND</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0708;
      --panel:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.14);
      --text:#f6eef1;
      --muted:#cdbbc3;
      --accent:#ff4d8d;
      --accent2:#ffd1a8;
      --radius:18px;
      --shadow:0 18px 45px rgba(0,0,0,.35);
      --max:900px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding: 20px;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(255,77,141,.14), transparent 60%),
        radial-gradient(800px 500px at 90% 15%, rgba(255,209,168,.10), transparent 60%),
        linear-gradient(180deg,#070405,#0b0708 40%,#070405);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .card{
      max-width: var(--max);
      width: 100%;
      padding: 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
    }
    .title{
      font-family:"Cormorant Garamond", serif;
      font-size: 2.2rem;
      margin: 0 0 10px;
      letter-spacing:.02em;
    }
    .muted{color:var(--muted); line-height:1.7; margin:0}
    .row{
      display:flex; gap:12px; flex-wrap:wrap;
      margin-top: 14px;
    }
    a{
      text-decoration:none;
      display:inline-block;
      padding: 12px 14px;
      border-radius: 14px;
      border:1px solid var(--line);
      color:var(--text);
      background: rgba(255,255,255,.03);
    }
    a.primary{
      color:#14070b;
      font-weight:700;
      border-color: rgba(255,255,255,.15);
      background: linear-gradient(135deg, rgba(255,77,141,.95), rgba(255,209,168,.55));
    }
    .logo{
      width:34px; height:34px;
      border-radius: 12px;
      border:1px solid var(--line);
      object-fit:cover;
      vertical-align:middle;
      margin-right:10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">
      <img class="logo"
           src="https://commons.wikimedia.org/wiki/Special:FilePath/Gloriosa%20superba%20flower.jpg"
           alt="Gloriosa superba — RIND logo"
           loading="lazy">
      404 — This page isn’t woven yet
    </h1>
    <p class="muted">
      The page you’re looking for may have moved, or the link may be broken.
      Let’s get you back to RIND.
    </p>

    <div class="row">
      <a class="primary" href="index.html">Back to Home</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </main>
</body>
</html>
